name: Integration Tests

on:
  push:
  pull_request:

permissions: {}

jobs:
  integration:
    permissions:
      contents: read
    name: Instance manager (real Percona)
    runs-on: ubuntu-latest
    steps:
      - name: Clone the code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod

      # The instance-manager integration tests build our own slim Percona Server
      # images (Dockerfile.instance: Debian + Percona APT repos, per version
      # 5.6 / 8.0 / 8.4 / 9.x) and run them as real containers via testcontainers,
      # so they require a working Docker daemon (present on ubuntu-latest runners)
      # and outbound access to repo.percona.com and archive.debian.org (5.6).
      - name: Running Integration Tests
        run: |
          go mod tidy
          make test-integration
