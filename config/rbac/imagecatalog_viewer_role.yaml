# This rule is not used by the project cloudnative-mysql itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to mysql.cloudnative-mysql.io resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: cloudnative-mysql
    app.kubernetes.io/managed-by: kustomize
  name: imagecatalog-viewer-role
rules:
- apiGroups:
  - mysql.cloudnative-mysql.io
  resources:
  - imagecatalogs
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - mysql.cloudnative-mysql.io
  resources:
  - imagecatalogs/status
  verbs:
  - get
