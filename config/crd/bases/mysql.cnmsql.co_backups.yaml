                description: Method is the backup method to use.
                enum:
                - xtrabackup
                - volumeSnapshot
                type: string
              objectStore:
                description: |-
                  ObjectStore overrides the destination configured on the referenced
                  Cluster. When omitted, the Cluster's backup object store is used.
                properties:
                  bucket:
                    description: Bucket is the destination bucket name.
                    type: string
                  credentials:
                    description: Credentials to access the object store.
                    properties:
                      accessKeyId:
                        description: The reference to the secret key containing the
                          access key id.
                        properties:
                          key:
                            description: Key within the Secret to select
                            type: string
                          name:
                            description: Name of the Secret
                            type: string
                        required:
                        - key
                        - name
                        type: object
                      inheritFromIAMRole:
                        default: false
                        description: |-
                          InheritFromIAMRole, when true, makes the credentials be retrieved from the
                          pod's environment (IRSA / instance profile) instead of from a secret.
                        type: boolean
                      secretAccessKey:
                        description: The reference to the secret key containing the
                          secret access key.
                        properties:
                          key:
                            description: Key within the Secret to select
                            type: string
                          name:
                            description: Name of the Secret
                            type: string
                        required:
                        - key
                        - name
                        type: object
                      sessionToken:
                        description: |-
                          The reference to the secret key containing the session token, used for
                          temporary credentials.
                        properties:
                          key:
                            description: Key within the Secret to select
                            type: string
                          name:
                            description: Name of the Secret
                            type: string
                        required:
                        - key
                        - name
                        type: object
