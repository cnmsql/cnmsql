name: Unit Tests

on:
  push:
    branches:
    - main
  pull_request:


permissions: {}

jobs:
  generate-jobs:
    name: Generate k8s version matrix
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      k8sMatrix: ${{ steps.versions.outputs.k8s_versions }}
      latest: ${{ steps.versions.outputs.latest }}
    steps:
    - name: Clone the code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false

    - name: Compute k8s versions from scope
      id: versions
      run: |
        # Expand unit_test.min..unit_test.max into 1.<minor>.x values for envtest.
        k8s_versions=$(jq -c '
          .unit_test.max as $max |
          .unit_test.min as $min |
          $min | [ while(. <= $max;
              . | split(".") | .[1] |= (.|tonumber|.+1|tostring) | join(".")
            )
          ] |
          .[] |= .+".x"
        ' < .github/k8s_versions_scope.json)
        echo "k8s_versions=${k8s_versions}" >> "$GITHUB_OUTPUT"
        echo "latest=$(jq -r '.|last' <<< "$k8s_versions")" >> "$GITHUB_OUTPUT"

  unit:
    name: envtest (k8s ${{ matrix.k8s-version }})
    needs: generate-jobs
    permissions:
      contents: read
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        k8s-version: ${{ fromJSON(needs.generate-jobs.outputs.k8sMatrix) }}
    env:
      ENVTEST_K8S_VERSION: ${{ matrix.k8s-version }}
    steps:
    - name: Clone the code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false

    - name: Setup Go
      uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
      with:
        go-version-file: go.mod

    - name: Running Tests
      run: |
        go mod tidy
        make test

    - name: Build coverage report
      if: matrix.k8s-version == needs.generate-jobs.outputs.latest
      run: |
        go tool cover -func=cover.out > coverage.txt
        go tool cover -html=cover.out -o coverage.html
        awk '/^total:/ { print $3 }' coverage.txt | tr -d '%' > coverage-total.txt

        total=$(cat coverage-total.txt)
        if [[ ! "$total" =~ ^(100(\.0)?|[0-9]{1,2}(\.[0-9])?)$ ]]; then
          echo "::error::Could not extract a valid coverage percentage"
          exit 1
        fi

        {
          echo '## Code coverage'
          echo
          echo "**${total}%** of statements are covered."
          echo
          echo 'The full text and HTML reports are attached to this workflow run.'
        } >> "$GITHUB_STEP_SUMMARY"

    - name: Upload coverage report
      if: matrix.k8s-version == needs.generate-jobs.outputs.latest
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
      with:
        name: coverage-report
        path: |
          cover.out
          coverage.txt
          coverage.html
          coverage-total.txt
        if-no-files-found: error
        retention-days: 14

    - name: Upload coverage summary
      if: matrix.k8s-version == needs.generate-jobs.outputs.latest
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
      with:
        name: coverage-summary
        path: coverage-total.txt
        if-no-files-found: error
        retention-days: 1
