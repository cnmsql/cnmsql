name: E2E Tests

on:
  schedule:
  - cron: '0 1 * * *'
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number'
        required: false
        type: string
      pr_sha:
        description: 'PR head SHA'
        required: false
        type: string


permissions: {}

concurrency:
  group: e2e-${{ github.event.inputs.pr_number || github.event_name }}
  cancel-in-progress: true

env:
  # renovate: datasource=github-releases depName=kubernetes-sigs/kind
  # Must be >= the kind release that builds the kindest/node images in
  # .github/kind_versions.json. v1.36.x node images use containerd config v4,
  # which only kind v0.32.0+ can read (older kind fails `kind load` with
  # "unknown containerd config version: 4"). Keep in sync with k8s_versions_scope.json.
  KIND_VERSION: v0.32.0

jobs:
  generate-jobs:
    name: Generate E2E matrix
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    outputs:
      kindMatrix: ${{ steps.generate.outputs.kindMatrix }}
      kindEnabled: ${{ steps.generate.outputs.kindEnabled }}
    steps:
    - name: Clone the code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false

    - name: Comment run URL
      if: github.event.inputs.pr_number != ''
      run: |
        RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        gh api "repos/${{ github.repository }}/issues/${{ github.event.inputs.pr_number }}/comments" \
          -f body="E2E tests triggered for commit \`${{ github.event.inputs.pr_sha }}\` — [view run](${RUN_URL})" --silent || true
      env:
        GH_TOKEN: ${{ github.token }}

    - name: Generate jobs
      id: generate
      run: |
        # Map the triggering event onto a matrix mode. All events currently run
        # the full cross; the case is kept so a cheaper mode can be reintroduced
        # per event without touching the workflow wiring.
        case "${{ github.event_name }}" in
          schedule)           mode=schedule ;;
          workflow_dispatch)  mode=workflow_dispatch ;;
          *)                  mode=pull_request ;;
        esac
        python3 .github/e2e-matrix-generator.py -m "$mode"

  e2e:
    name: ${{ matrix.id }}
    needs: generate-jobs
    if: needs.generate-jobs.outputs.kindEnabled == 'true'
    runs-on: ${{ github.repository_owner == 'cnmsql' && 'self-hosted' || 'ubuntu-latest' }}
    permissions:
      contents: read
      statuses: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.generate-jobs.outputs.kindMatrix) }}
    env:
      K8S_VERSION: ${{ matrix.k8s_version }}
      E2E_MYSQL_VERSION: ${{ matrix.mysql_version }}
      CERT_MANAGER_INSTALL_SKIP: "false"
      GINKGO_TIMEOUT: ${{ github.repository_owner == 'cnmsql' && '240m' || '120m' }}
      E2E_TIMEOUT_MULTIPLIER: ${{ github.repository_owner == 'cnmsql' && '2' || '1' }}
    steps:
    - name: Clone the code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false
        ref: ${{ github.event.inputs.pr_sha || github.ref }}

    - name: Create pending status
      if: github.event.inputs.pr_sha != ''
      run: |
        gh api "repos/${{ github.repository }}/statuses/${{ github.event.inputs.pr_sha }}" \
          -f state="pending" \
          -f context="E2E / ${{ matrix.id }}" \
          -f description="E2E tests running" \
          -f target_url="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
      env:
        GH_TOKEN: ${{ github.token }}

    - name: Setup Go
      uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
      with:
        go-version-file: go.mod

    - name: Install kind
      run: |
        curl -fsSL -o ./kind \
          "https://kind.sigs.k8s.io/dl/${KIND_VERSION}/kind-linux-amd64"
        chmod +x ./kind
        sudo mv ./kind /usr/local/bin/kind
        kind version

    - name: Run e2e suite (k8s ${{ matrix.k8s_version }}, MySQL ${{ matrix.mysql_version }})
      run: |
        make test-e2e

    - name: Update status
      if: always() && github.event.inputs.pr_sha != ''
      run: |
        if [[ "${{ job.status }}" == "success" ]]; then
          STATE="success"
          DESC="E2E tests passed"
        else
          STATE="failure"
          DESC="E2E tests failed"
        fi
        gh api "repos/${{ github.repository }}/statuses/${{ github.event.inputs.pr_sha }}" \
          -f state="$STATE" \
          -f context="E2E / ${{ matrix.id }}" \
          -f description="$DESC" \
          -f target_url="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
      env:
        GH_TOKEN: ${{ github.token }}

    - name: Cleanup after e2e
      if: always()
      run: |
        make cleanup-test-e2e || true
