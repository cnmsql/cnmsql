# git-cliff configuration ~ https://git-cliff.org/docs/configuration
#
# Generates release notes from Conventional Commits, enriched with GitHub
# data (PR links, contributor handles, first-time contributors).

[remote.github]
owner = "cnmsql"
repo = "cnmsql"

[changelog]
# Rendered once at the top when writing a full CHANGELOG.md. GoReleaser uses
# `--latest`, so this header is stripped in the release pipeline.
header = """
# Changelog

All notable changes to this project are documented here.\n
"""

body = """
{%- macro remote_url() -%}
  https://github.com/{{ remote.github.owner }}/{{ remote.github.repo }}
{%- endmacro -%}

{% if version -%}
  ## {{ version }} - {{ timestamp | date(format="%Y-%m-%d") }}
{% else -%}
  ## Unreleased
{% endif %}
{% for group, commits in commits | group_by(attribute="group") %}
  ### {{ group | striptags | trim | upper_first }}
  {% for commit in commits %}
    - {% if commit.scope %}**({{ commit.scope }})** {% endif %}\
      {% if commit.breaking %}[**breaking**] {% endif %}\
      {{ commit.message | upper_first }}\
      {% if commit.remote.username %} by @{{ commit.remote.username }}{% endif %}\
      {% if commit.remote.pr_number %} in \
        [#{{ commit.remote.pr_number }}]({{ self::remote_url() }}/pull/{{ commit.remote.pr_number }})\
      {% endif %}\
      ([{{ commit.id | truncate(length=7, end="") }}]({{ self::remote_url() }}/commit/{{ commit.id }}))
  {% endfor %}
{% endfor %}

{%- if github.contributors | filter(attribute="is_first_time", value=true) | length != 0 %}
### 🎉 New Contributors
{% for contributor in github.contributors | filter(attribute="is_first_time", value=true) %}
- @{{ contributor.username }} made their first contribution\
  {% if contributor.pr_number %} in \
    [#{{ contributor.pr_number }}]({{ self::remote_url() }}/pull/{{ contributor.pr_number }})\
  {% endif %}
{% endfor %}
{%- endif %}

{% if version and previous.version -%}
**Full Changelog**: {{ self::remote_url() }}/compare/{{ previous.version }}...{{ version }}
{% endif %}

---

## Plugin Installation

```sh
curl -sSfL {{ self::remote_url() }}/raw/main/hack/install-cnmsql-plugin.sh | sh -s -- -b /usr/local/bin {{ version }}
```

Omit the tag to install the latest release, or replace `/usr/local/bin` with any directory on your `PATH`.

The script also installs a `kubectl_complete-cnmsql` shim so `kubectl cnmsql <TAB>` autocompletes subcommands and cluster names.
"""

footer = """
<!-- generated by git-cliff -->
"""

trim = true

[git]
conventional_commits = true
filter_unconventional = false
split_commits = false
protect_breaking_commits = true
filter_commits = false
topo_order = false
sort_commits = "newest"

commit_parsers = [
  { message = "^feat", group = "<!-- 0 -->🚀 Features" },
  { message = "^fix", group = "<!-- 1 -->🐛 Bug Fixes" },
  { message = "^perf", group = "<!-- 2 -->⚡ Performance" },
  { message = "^refactor", group = "<!-- 3 -->♻️ Refactor" },
  { message = "^docs", group = "<!-- 4 -->📚 Documentation" },
  { message = "^test", group = "<!-- 5 -->🧪 Testing" },
  { message = "^build", group = "<!-- 6 -->📦 Build & Dependencies" },
  { message = "^(ci|chore\\(ci\\))", group = "<!-- 7 -->🤖 CI" },
  { message = "^revert", group = "<!-- 8 -->⏪ Reverts" },
  # Noise we don't want in the release notes.
  { message = "^chore\\(release\\)", skip = true },
  { message = "^chore\\(deps", group = "<!-- 6 -->📦 Build & Dependencies" },
  { message = "^chore", skip = true },
  { message = "^style", skip = true },
  { message = "^Merge", skip = true },
  { message = ".*", group = "<!-- 9 -->🌀 Other" },
]

# Skip pre-release / tooling tags from the changelog.
tag_pattern = "v[0-9].*"
skip_tags = "v.*-(alpha|beta|rc).*"
ignore_tags = ""
