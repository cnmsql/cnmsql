# Namespaced variant of role_binding.yaml, used by the config/namespaced overlay.
# Binds the namespaced manager-role Role to the controller-manager ServiceAccount
# within a single namespace (the overlay's `namespace:`), instead of cluster-wide.
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  labels:
    app.kubernetes.io/name: cloudnative-mysql
    app.kubernetes.io/managed-by: kustomize
  name: manager-rolebinding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: manager-role
subjects:
- kind: ServiceAccount
  name: controller-manager
  namespace: system
