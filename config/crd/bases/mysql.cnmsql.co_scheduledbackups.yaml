  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: scheduledbackups.mysql.cnmsql.co
spec:
  group: mysql.cnmsql.co
  names:
    kind: ScheduledBackup
    listKind: ScheduledBackupList
    plural: scheduledbackups
    shortNames:
    - myscheduledbackup
    singular: scheduledbackup
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.cluster.name
      name: Cluster
      type: string
    - jsonPath: .spec.schedule
      name: Schedule
      type: string
    - jsonPath: .status.lastScheduleTime
      name: Last Backup
      type: date
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: ScheduledBackup is the Schema for the scheduledbackups API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of ScheduledBackup
            properties:
              backupOwnerReference:
                default: self
                description: |-
                  BackupOwnerReference controls the owner reference set on the generated
                  Backup objects.
                enum:
                - none
                - self
                - cluster
                type: string
              cluster:
                description: Cluster references the cluster to back up.
                properties:
                  name:
                    description: Name of the referent
                    type: string
                required:
                - name
                type: object
              immediate:
                default: false
                description: |-
                  Immediate, when true, takes a backup as soon as the ScheduledBackup is
                  created, in addition to the schedule.
                type: boolean
              method:
                default: xtrabackup
                description: Method is the backup method used for the generated backups.
                enum:
                - xtrabackup
                - volumeSnapshot
                type: string
              objectStoreCleanup:
                default: false
                description: |-
                  ObjectStoreCleanup, when true, adds the object-store cleanup finalizer
                  (mysql.cnmsql.co/cleanup-backup-files) to generated Backups, so deleting a
                  generated Backup also removes its archive (backup.xbstream + metadata.json)
                  from the object store. Defaults to false, matching the non-destructive
