                    type: string
                  region:
                    description: |-
                      Region is the bucket region. Required by most providers; for AWS it
                      selects the regional endpoint.
                    type: string
                  serverSideEncryption:
                    description: ServerSideEncryption sets the SSE algorithm (e.g.
