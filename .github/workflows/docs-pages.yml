name: Documentation

# Docs are published from the website repo (cnmsql/docs), which owns GitHub
# Pages and the versioned site. This workflow:
#   - validates that docs still build on pull requests, and
#   - notifies the website repo to (re)build when docs change on main or a
#     release is published.
on:
  push:
    branches:
    - main
    paths:
    - docs/**
    - .github/workflows/docs-pages.yml
  pull_request:
    paths:
    - docs/**
    - .github/workflows/docs-pages.yml
  release:
    types: [published]
  workflow_dispatch:

permissions: {}

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate documentation build
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - name: Clone the code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false

    - name: Setup Node.js
      uses: actions/setup-node@v6.4.0
      with:
        node-version: 22
        cache: npm
        cache-dependency-path: docs/package-lock.json

    - name: Install dependencies
      working-directory: docs
      run: npm ci

    - name: Build documentation
      working-directory: docs
      run: npm run build

  notify-website:
    name: Notify website repo
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions: {}
    steps:
    - name: Dispatch to cnmsql/docs
      env:
        GH_TOKEN: ${{ secrets.DOCS_DISPATCH_TOKEN }}
      run: |
        set -euo pipefail
        if [ "${{ github.event_name }}" = "release" ]; then
          event_type=docs-release
          ref="${{ github.event.release.tag_name }}"
          version="${{ github.event.release.tag_name }}"
        else
          event_type=docs-update
          ref="${{ github.ref_name }}"
          version=""
        fi
        echo "dispatching $event_type (ref=$ref version=$version)"
        gh api "repos/cnmsql/docs/dispatches" \
          -f "event_type=$event_type" \
          -F "client_payload[ref]=$ref" \
          -F "client_payload[version]=$version"
