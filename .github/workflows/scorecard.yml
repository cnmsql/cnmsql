name: Scorecard supply-chain security

on:
  # Re-evaluate whenever branch protection changes, weekly, and on pushes to main.
  branch_protection_rule:
  schedule:
  - cron: '0 2 * * 1'
  push:
    branches: [ main ]

permissions: {}

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      # Needed to upload results to the code-scanning dashboard.
      security-events: write
      # Needed by publish_results to sign the results and publish them to the
      # public OpenSSF API that backs the README badge.
      id-token: write
    steps:
    - name: Clone the code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false

    - name: Run analysis
      uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
      with:
        results_file: results.sarif
        results_format: sarif
        # Publishes results to the public OpenSSF API so the README badge and
        # https://scorecard.dev viewer can read them.
        publish_results: true

    - name: Upload SARIF artifact
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
      with:
        name: scorecard-results
        path: results.sarif
        retention-days: 5

    - name: Upload to code-scanning
      uses: github/codeql-action/upload-sarif@192325c86100d080feab897ff886c34abd4c83a3 # v3.30.3
      with:
        sarif_file: results.sarif
