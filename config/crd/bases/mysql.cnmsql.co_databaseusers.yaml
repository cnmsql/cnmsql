                description: MaxQueriesPerHour resource limit. 0 = no limit.
                format: int32
                minimum: 0
                type: integer
              maxUpdatesPerHour:
                description: MaxUpdatesPerHour resource limit. 0 = no limit.
                format: int32
                minimum: 0
                type: integer
              maxUserConnections:
