                    type: string
                  serverSideEncryption:
                    description: ServerSideEncryption sets the SSE algorithm (e.g.
                      "AES256" or "aws:kms").
                    type: string
                  signatureVersion:
                    default: s3v4
                    description: |-
                      SignatureVersion selects the request signing scheme. Defaults to s3v4;
                      set to s3v2 for legacy providers.
                    enum:
                    - s3v4
                    - s3v2
                    type: string
                  storageClass:
                    description: StorageClass sets the object storage class (e.g.
                      "STANDARD_IA").
                    type: string
                  tls:
                    description: TLS configuration for the endpoint connection.
                    properties:
                      caBundleSecret:
                        description: |-
                          CABundleSecret references a secret key holding a PEM CA bundle used to
                          verify the endpoint certificate (for private CAs / self-signed endpoints).
                        properties:
                          key:
                            description: Key within the Secret to select
                            type: string
                          name:
                            description: Name of the Secret
                            type: string
                        required:
                        - key
                        - name
                        type: object
                      insecureSkipVerify:
                        default: false
                        description: |-
                          InsecureSkipVerify disables TLS certificate verification against the
                          endpoint. Use only for testing.
                        type: boolean
                    type: object
                required:
                - bucket
                - credentials
                type: object
              phase:
                description: Phase is the current phase of the backup.
                type: string
              sha256:
                description: SHA256 is the checksum of the uploaded backup artifact.
                type: string
              startedAt:
                description: StartedAt/StoppedAt record the backup timing.
                format: date-time
                type: string
              stoppedAt:
                format: date-time
                type: string
            type: object
