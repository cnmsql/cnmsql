name: Authorize e2e commands

on:
  issue_comment:
    types: [ created ]

permissions: {}

concurrency:
  group: authorize-e2e-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  authorize:
    name: Authorize
    runs-on: ubuntu-latest
    if: github.event.issue.pull_request != ''
    permissions:
      actions: write
      pull-requests: read
      statuses: write
    steps:
    - name: Check authorization
      id: check
      run: |
        # /e2e-not-needed clears the gate without running; /test dispatches the
        # run. Match /e2e-not-needed first so its /e2e prefix is not read as /test.
        if [[ "$COMMENT_BODY" =~ (^|[[:space:]])/e2e-not-needed([[:space:]]|$) ]]; then
          cmd="not-needed"
        elif [[ "$COMMENT_BODY" =~ (^|[[:space:]])/test([[:space:]]|$) ]]; then
          cmd="test"
        else
          echo "Comment has no recognized e2e command — skipping"
          exit 0
        fi

        case "${{ github.event.comment.author_association }}" in
          OWNER|MEMBER|COLLABORATOR) ;;
          *)
            echo "Only maintainers can run e2e commands, got ${{ github.event.comment.author_association }} — skipping"
            exit 0
            ;;
        esac

        PR_JSON=$(gh pr view "${{ github.event.issue.number }}" -R "${{ github.repository }}" \
          --json headRefOid,headRefName,isCrossRepository)
        {
          echo "command=$cmd"
          echo "pr_sha=$(jq -r .headRefOid <<<"$PR_JSON")"
          echo "head_ref=$(jq -r .headRefName <<<"$PR_JSON")"
          echo "cross=$(jq -r .isCrossRepository <<<"$PR_JSON")"
        } >> "$GITHUB_OUTPUT"
        echo "Authorized /$cmd for PR #${{ github.event.issue.number }}"
      env:
        GH_TOKEN: ${{ github.token }}
        # Passed via env (not inlined) since a comment body is attacker-controlled.
        COMMENT_BODY: ${{ github.event.comment.body }}

    - name: Mark e2e as not needed
      if: steps.check.outputs.command == 'not-needed' && steps.check.outputs.pr_sha != ''
      run: |
        gh api "repos/${{ github.repository }}/statuses/${{ steps.check.outputs.pr_sha }}" \
          -f state="success" \
          -f context="e2e" \
          -f description="Marked not needed by /e2e-not-needed" \
          -f target_url="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" --silent
      env:
        GH_TOKEN: ${{ github.token }}

    - name: Resolve the e2e gate and dispatch the run
      if: steps.check.outputs.command == 'test' && steps.check.outputs.pr_sha != ''
      run: |
        PR_SHA="${{ steps.check.outputs.pr_sha }}"
        RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

        # Clear the single approval gate so it no longer shows pending; the
        # dispatched run reports the real per-lane E2E results.
        gh api "repos/${{ github.repository }}/statuses/$PR_SHA" \
          -f state="success" \
          -f context="e2e" \
          -f description="Dispatched by /test — see E2E checks" \
          -f target_url="$RUN_URL" --silent || true

        # Run the pipeline on the PR branch so the PR's own workflow version runs
        # (it may itself change e2e.yml) and the jobs attach to the PR commit.
        # Fork PRs have no branch in this repo, so fall back to the default branch
        # and rely on the pr_sha checkout.
        if [[ "${{ steps.check.outputs.cross }}" == "true" ]]; then
          echo "Fork PR — dispatching e2e.yml from the default branch"
          gh workflow run e2e.yml -R "${{ github.repository }}" \
            -f pr_number="${{ github.event.issue.number }}" \
            -f pr_sha="$PR_SHA"
        else
          echo "Same-repo PR — dispatching e2e.yml on branch ${{ steps.check.outputs.head_ref }}"
          gh workflow run e2e.yml -R "${{ github.repository }}" \
            --ref "${{ steps.check.outputs.head_ref }}" \
            -f pr_number="${{ github.event.issue.number }}" \
            -f pr_sha="$PR_SHA"
        fi
      env:
        GH_TOKEN: ${{ github.token }}
