              endBinlog:
                type: string
              endGTID:
                type: string
              error:
                description: Error holds the error message if the backup failed.
                type: string
              instanceName:
                description: InstanceName is the instance the backup was taken from.
                type: string
              jobName:
                description: JobName is the Kubernetes Job running this backup.
                type: string
              method:
                description: Method is the method that was used.
                enum:
                - xtrabackup
                - volumeSnapshot
                type: string
              objectStore:
                description: |-
                  ObjectStore records the destination the backup was uploaded to, resolved at
                  backup time from the Backup spec or the referenced Cluster. It is snapshotted
                  so the cleanup finalizer can still locate and remove the archive after the
