name: Release

on:
  push:
    tags:
    - v*

permissions: {}

jobs:
  goreleaser:
    name: Release kubectl-cnmsql
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Clone the code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false
        fetch-depth: 0

    - name: Setup Go
      uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
      with:
        go-version-file: go.mod

    - name: Generate release notes
      id: git-cliff
      uses: orhun/git-cliff-action@f50e11560dce63f7c33227798f90b924471a88b5 # v4.8.0
      with:
        config: cliff.toml
        args: --latest --strip header --output RELEASE_NOTES.md
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GITHUB_REPO: ${{ github.repository }}

    - name: Run GoReleaser
      uses: goreleaser/goreleaser-action@v6
      with:
        distribution: goreleaser
        version: "~> v2"
        args: release --clean --release-notes=${{ steps.git-cliff.outputs.changelog }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  announce:
    name: Announce release on PRs
    runs-on: ubuntu-latest
    needs: goreleaser
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
    - name: Comment on shipped PRs
      uses: apexskier/github-release-commenter@e7813a9625eabd79a875b4bc4046cfcae377ab34 # v1.4.1
      with:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        release-tag: ${{ github.ref_name }}
        comment-template: |
          🚀 This shipped in **{release_tag}** — thanks for contributing!

          {release_link}
        label-template: |
          released
