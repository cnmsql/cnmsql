# Multi-node Kind topology for the e2e suite (the Makefile default).
#
# A single-node cluster cannot exercise node drain / eviction: every Pod shares
# the one node, so there is no "other node" to fail. Three worker nodes let the
# Serial node-failure spec spread a 3-instance Cluster one instance per node (via
# topologySpreadConstraints) and drain a single worker to simulate a node going
# down. The rest of the suite runs here too; the node-failure spec runs Serial,
# after the parallel specs finish, so its drain never disrupts them.
#
# The node images are intentionally left unset so the
# `--image kindest/node:<K8S_VERSION>` flag from the Makefile applies uniformly
# to every node.
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
- role: control-plane
- role: worker
- role: worker
- role: worker
