version: 2

dist: build/goreleaser

project_name: kubectl-cnmsql

before:
  hooks:
  - go mod tidy

builds:
- id: kubectl-cnmsql
  main: ./cmd/kubectl-cnmsql
  binary: kubectl-cnmsql
  goos:
  - linux
  - darwin
  - windows
  goarch:
  - amd64
  - arm64
  ignore:
  - goos: windows
    goarch: arm64
  env:
  - CGO_ENABLED=0
  ldflags:
  - -s -w
  - -X github.com/cnmsql/cnmsql/cmd/kubectl-cnmsql/cmd.Version={{.Version}}
  - -X github.com/cnmsql/cnmsql/cmd/kubectl-cnmsql/cmd.Commit={{.Commit}}
  - -X github.com/cnmsql/cnmsql/cmd/kubectl-cnmsql/cmd.BuildDate={{.Date}}

archives:
- id: default
  formats:
  - tar.gz
  format_overrides:
  - goos: windows
    formats:
    - zip
  name_template: >-
    {{ .ProjectName }}_ {{- .Version }}_ {{- .Os }}_ {{- .Arch }}

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ .Tag }}-next"

# Release notes are generated by git-cliff (see cliff.toml) and passed to
# GoReleaser via `--release-notes`, which replaces the built-in changelog
# (including header/footer). Keep it disabled here to avoid double work.
changelog:
  disable: true

release:
  prerelease: auto
