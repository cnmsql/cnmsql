---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: validating-webhook-configuration
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /validate-mysql-cloudnative-mysql-io-v1alpha1-cluster-status
  failurePolicy: Fail
  name: vclusterstatus-v1alpha1.cloudnative-mysql.io
  rules:
  - apiGroups:
    - mysql.cloudnative-mysql.io
    apiVersions:
    - v1alpha1
    operations:
    - UPDATE
    resources:
    - clusters
  sideEffects: None
