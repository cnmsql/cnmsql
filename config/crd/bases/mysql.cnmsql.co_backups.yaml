                description: BackupID is a unique identifier of the backup in the
                  object store.
                type: string
              beginBinlog:
                description: BeginBinlog/EndBinlog record the binary log coordinates.
                type: string
              beginGTID:
                description: BeginGTID/EndGTID record the GTID range covered by the
                  backup.
                type: string
              conditions:
                description: Conditions represent the latest observations of the backup
