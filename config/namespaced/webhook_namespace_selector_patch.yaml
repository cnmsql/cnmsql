# Restricts all validating webhooks (webhook 0: status authz; webhook 1: spec
# validation; webhook 2: instance Pod authz) to a single namespace, so that
# cohabiting namespaced operators do not intercept each other's Clusters or
# instance Pods. The placeholder namespace value is replaced by a kustomize
# `replacements` block (see config/namespaced/kustomization.yaml) that copies the
# webhook Service's namespace. Used only by the config/namespaced overlay.
- op: add
  path: /webhooks/0/namespaceSelector
  value:
    matchExpressions:
    - key: kubernetes.io/metadata.name
      operator: In
      values:
      - system
- op: add
  path: /webhooks/1/namespaceSelector
  value:
    matchExpressions:
    - key: kubernetes.io/metadata.name
      operator: In
      values:
      - system
- op: add
  path: /webhooks/2/namespaceSelector
  value:
    matchExpressions:
    - key: kubernetes.io/metadata.name
      operator: In
      values:
      - system
- op: add
  path: /webhooks/3/namespaceSelector
  value:
    matchExpressions:
    - key: kubernetes.io/metadata.name
      operator: In
      values:
      - system
