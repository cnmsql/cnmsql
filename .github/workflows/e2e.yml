name: E2E Tests

on:
  schedule:
  - cron: '0 1 * * *'
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number'
        required: false
        type: string
      pr_sha:
        description: 'PR head SHA'
        required: false
        type: string


permissions: {}

concurrency:
  group: e2e-${{ github.event.inputs.pr_number || github.event_name }}
  # Cancel superseded PR/dispatch runs, but never cancel the nightly schedule.
  cancel-in-progress: ${{ github.event_name != 'schedule' }}

env:
  # renovate: datasource=github-releases depName=kubernetes-sigs/kind
  # Must be >= the kind release that builds the kindest/node images in
  # .github/kind_versions.json. v1.36.x node images use containerd config v4,
  # which only kind v0.32.0+ can read (older kind fails `kind load` with
  # "unknown containerd config version: 4"). Keep in sync with k8s_versions_scope.json.
  KIND_VERSION: v0.32.0

jobs:
  generate-jobs:
    name: Generate E2E lane matrix
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    outputs:
      kindMatrix: ${{ steps.generate.outputs.kindMatrix }}
      kindEnabled: ${{ steps.generate.outputs.kindEnabled }}
    steps:
    - name: Clone the code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false

    - name: Comment run URL
      if: github.event.inputs.pr_number != ''
      run: |
        RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        gh api "repos/${{ github.repository }}/issues/${{ github.event.inputs.pr_number }}/comments" \
          -f body="E2E tests triggered for commit \`${{ github.event.inputs.pr_sha }}\` — [view run](${RUN_URL})" --silent || true
      env:
        GH_TOKEN: ${{ github.token }}

    - name: Generate lanes
      id: generate
      run: |
        case "${{ github.event_name }}" in
          schedule)           mode=schedule ;;
          workflow_dispatch)  mode=workflow_dispatch ;;
          *)                  mode=pull_request ;;
        esac
        python3 .github/e2e-matrix-generator.py -m "$mode"

  e2e:
    name: ${{ matrix.id }}
    needs: generate-jobs
    if: needs.generate-jobs.outputs.kindEnabled == 'true'
    runs-on: ${{ github.repository_owner == 'cnmsql' && 'self-hosted' || 'ubuntu-latest' }}
    permissions:
      contents: read
      statuses: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.generate-jobs.outputs.kindMatrix) }}
    env:
      # Lane fields map straight onto the knobs the suite + hack/e2e.sh consume.
      K8S_VERSION: ${{ matrix.k8s_version }}
      E2E_MYSQL_VERSION: ${{ matrix.mysql_version }}
      E2E_MAJOR_UPGRADE: ${{ matrix.major_upgrade }}
      GINKGO_LABEL_FILTER: ${{ matrix.label_filter }}
      GINKGO_PROCS: ${{ matrix.procs }}
      CERT_MANAGER_INSTALL_SKIP: "false"
      GINKGO_TIMEOUT: ${{ github.repository_owner == 'cnmsql' && '240m' || '120m' }}
      E2E_TIMEOUT_MULTIPLIER: ${{ github.repository_owner == 'cnmsql' && '2' || '1' }}
      E2E_JUNIT: test-results/junit.xml
    steps:
    - name: Clone the code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false
        ref: ${{ github.event.inputs.pr_sha || github.ref }}

    - name: Create pending status
      if: github.event.inputs.pr_sha != ''
      run: |
        gh api "repos/${{ github.repository }}/statuses/${{ github.event.inputs.pr_sha }}" \
          -f state="pending" \
          -f context="E2E / ${{ matrix.id }}" \
          -f description="E2E tests running" \
          -f target_url="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
      env:
        GH_TOKEN: ${{ github.token }}

    - name: Setup Go
      uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
      with:
        go-version-file: go.mod

    - name: Install kind
      run: |
        curl -fsSL -o ./kind \
          "https://kind.sigs.k8s.io/dl/${KIND_VERSION}/kind-linux-amd64"
        chmod +x ./kind
        sudo mv ./kind /usr/local/bin/kind
        kind version

    - name: Prepare runner
      run: |
        # Unique cluster name per run so a leftover cluster from a crashed job is
        # never silently reused (the self-hosted runner is persistent). The lane
        # is NOT part of the name: lanes run sequentially on the single runner and
        # the sweep below clears leftovers, and adding it would push the dedicated
        # clusters' node names (<cluster>-control-plane, capped by the harness)
        # past the 63-char hostname limit.
        echo "KIND_CLUSTER=cnmsql-e2e-${GITHUB_RUN_ID}" >> "$GITHUB_ENV"
        # Sweep leftover cnmsql Kind clusters and reclaim disk before starting.
        for c in $(kind get clusters 2>/dev/null || true); do
          case "$c" in *cnmsql*) kind delete cluster --name "$c" || true ;; esac
        done
        docker system prune -f || true
        df -h / || true

    - name: Run e2e lane ${{ matrix.id }} (k8s ${{ matrix.k8s_version }}, MySQL ${{ matrix.mysql_version }})
      run: |
        mkdir -p test-results
        set -o pipefail
        make test-e2e 2>&1 | tee "test-results/run.log"

    - name: Update status
      if: always() && github.event.inputs.pr_sha != ''
      run: |
        if [[ "${{ job.status }}" == "success" ]]; then
          STATE="success"
          DESC="E2E tests passed"
        else
          STATE="failure"
          DESC="E2E tests failed"
        fi
        gh api "repos/${{ github.repository }}/statuses/${{ github.event.inputs.pr_sha }}" \
          -f state="$STATE" \
          -f context="E2E / ${{ matrix.id }}" \
          -f description="$DESC" \
          -f target_url="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
      env:
        GH_TOKEN: ${{ github.token }}

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
      with:
        name: e2e-${{ matrix.id }}
        path: test-results/
        if-no-files-found: ignore
        retention-days: 14

    - name: Cleanup after e2e
      if: always()
      run: |
        # Delete every cnmsql Kind cluster this lane may have created: the shared
        # suite cluster plus any ephemeral clusters the disruptive specs provision
        # (named <KIND_CLUSTER>-<slug>).
        for c in $(kind get clusters 2>/dev/null || true); do
          case "$c" in *cnmsql*) kind delete cluster --name "$c" || true ;; esac
        done
        rm -f /tmp/cnmsql-e2e-*.yaml || true
