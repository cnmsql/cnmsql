                - bucket
                - credentials
                type: object
              online:
                default: true
                description: Online, when true, performs a non-blocking (hot) backup.
                  Defaults to true.
                type: boolean
              reclaimPolicy:
                allOf:
                - enum:
                  - Retain
                  - Delete
                - enum:
                  - Retain
                  - Delete
                default: Retain
                description: |-
                  ReclaimPolicy controls what happens to this backup's object-store archive
                  (backup.xbstream + metadata.json) when the Backup object is deleted. With
                  "Delete" the operator adds the cleanup finalizer and removes the archive on
                  deletion; with "Retain" (the default) the archive is kept.
                type: string
              target:
                default: prefer-standby
                description: Target instance to take the backup from.
                enum:
                - primary
                - prefer-standby
                type: string
            required:
            - cluster
            type: object
          status:
            description: status defines the observed state of Backup
            properties:
