version: 2

dist: build/goreleaser

project_name: kubectl-cnmsql

before:
  hooks:
  - go mod tidy

builds:
- id: kubectl-cnmsql
  main: ./cmd/kubectl-cnmsql
  binary: kubectl-cnmsql
  goos:
  - linux
  - darwin
  - windows
  goarch:
  - amd64
  - arm64
  ignore:
  - goos: windows
    goarch: arm64
  env:
  - CGO_ENABLED=0
  ldflags:
  - -s -w
  - -X github.com/cnmsql/cnmsql/cmd/kubectl-cnmsql/cmd.Version={{.Version}}
  - -X github.com/cnmsql/cnmsql/cmd/kubectl-cnmsql/cmd.Commit={{.Commit}}
  - -X github.com/cnmsql/cnmsql/cmd/kubectl-cnmsql/cmd.BuildDate={{.Date}}

archives:
- id: default
  formats:
  - tar.gz
  format_overrides:
  - goos: windows
    formats:
    - zip
  name_template: >-
    {{ .ProjectName }}_ {{- .Version }}_ {{- .Os }}_ {{- .Arch }}

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ .Tag }}-next"

changelog:
  sort: asc
  filters:
    exclude:
    - "^docs:"
    - "^test:"
    - "^ci:"
    - "^chore:"
    - Merge pull request
    - Merge branch

release:
  prerelease: auto
  footer: |
    ## Plugin Installation

    ```sh
    curl -sSfL https://github.com/cnmsql/cnmsql/raw/main/hack/install-cnmsql-plugin.sh | sh -s -- -b /usr/local/bin {{ .Tag }}
    ```

    Omit the tag to install the latest release, or replace `/usr/local/bin` with any directory on your `PATH`.

    The script also installs a `kubectl_complete-cnmsql` shim so `kubectl cnmsql <TAB>` autocompletes subcommands and cluster names.
