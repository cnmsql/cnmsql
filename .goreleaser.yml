version: 2

dist: build/goreleaser

project_name: kubectl-cnmsql

before:
  hooks:
  - go mod tidy

builds:
- id: kubectl-cnmsql
  main: ./cmd/kubectl-cnmsql
  binary: kubectl-cnmsql
  goos:
  - linux
  - darwin
  - windows
  goarch:
  - amd64
  - arm64
  ignore:
  - goos: windows
    goarch: arm64
  env:
  - CGO_ENABLED=0
  ldflags:
  - -s -w
  - -X github.com/cnmsql/cnmsql/cmd/kubectl-cnmsql/cmd.Version={{.Version}}
  - -X github.com/cnmsql/cnmsql/cmd/kubectl-cnmsql/cmd.Commit={{.Commit}}
  - -X github.com/cnmsql/cnmsql/cmd/kubectl-cnmsql/cmd.BuildDate={{.Date}}

archives:
- id: default
  formats:
  - tar.gz
  format_overrides:
  - goos: windows
    formats:
    - zip
  name_template: >-
    {{ .ProjectName }}_ {{- .Version }}_ {{- .Os }}_ {{- .Arch }}

checksum:
  name_template: "checksums.txt"

# Keyless signing of the checksums file with cosign. Uses the GitHub Actions
# OIDC identity (no long-lived keys); the certificate is recorded in the public
# Rekor transparency log. Verify with:
#   cosign verify-blob --certificate checksums.txt.pem \
#     --signature checksums.txt.sig \
#     --certificate-identity-regexp 'https://github.com/cnmsql/cnmsql/.*' \
#     --certificate-oidc-issuer https://token.actions.githubusercontent.com \
#     checksums.txt
signs:
- cmd: cosign
  certificate: "${artifact}.pem"
  args:
  - sign-blob
  - "--output-certificate=${certificate}"
  - "--output-signature=${signature}"
  - "${artifact}"
  - --yes
  artifacts: checksum
  output: true

snapshot:
  version_template: "{{ .Tag }}-next"

# Release notes are generated by git-cliff (see cliff.toml) and passed to
# GoReleaser via `--release-notes`. That file is loaded by the changelog pipe,
# so the pipe MUST stay enabled: `changelog.disable: true` would skip the pipe
# and silently drop the release notes (empty release body). With --release-notes
# set, GoReleaser uses the file verbatim and skips its own changelog generation,
# so there is no double work to avoid.
changelog:
  disable: false

release:
  prerelease: auto
  mode: replace
