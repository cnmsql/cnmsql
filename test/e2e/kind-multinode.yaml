# Multi-node Kind topology used by the Serial node-failure e2e spec.
#
# A single-node cluster cannot exercise node drain / eviction: every Pod shares
# the one node, so there is no "other node" to fail. The node-failure spec
# provisions its OWN cluster from this config (kind create cluster --config), so
# the shared suite cluster stays single-node and is never disrupted by a drain.
# Three worker nodes let a 3-instance Cluster spread one instance per node (via
# topologySpreadConstraints) so draining a single worker isolates one instance.
#
# The node images are intentionally left unset so the spec's
# `--image kindest/node:<K8S_VERSION>` flag (when K8S_VERSION is set) applies
# uniformly to every node.
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
- role: control-plane
- role: worker
- role: worker
- role: worker
