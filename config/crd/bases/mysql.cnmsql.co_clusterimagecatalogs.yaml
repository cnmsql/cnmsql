---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: clusterimagecatalogs.mysql.cnmsql.co
spec:
  group: mysql.cnmsql.co
  names:
    kind: ClusterImageCatalog
    listKind: ClusterImageCatalogList
    plural: clusterimagecatalogs
    shortNames:
    - myclusterimagecatalog
    singular: clusterimagecatalog
  scope: Cluster
  versions:
  - name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          ClusterImageCatalog is the Schema for the clusterimagecatalogs API
          (cluster-scoped).
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of ClusterImageCatalog
            properties:
              images:
                description: |-
                  Images is the list of MySQL series to container image mappings. Each
                  series must appear at most once.
                items:
                  description: |-
                    CatalogImage maps a MySQL series to a container image. The series, not the
                    integer major, is the upgrade unit: MySQL 8.0 and 8.4 are distinct upgrade
                    targets that both live under integer major 8, so a catalog keyed by integer
                    major could not express the 8.0 -> 8.4 hop.
                  properties:
                    image:
                      description: Image is the fully qualified Percona Server for
                        MySQL image reference.
                      type: string
                    series:
                      description: |-
                        Series is the MySQL release series in "major.minor" form (e.g. "8.0",
                        "8.4", "9.0"). It must match the image's server version line.
                      pattern: ^[0-9]+\.[0-9]+$
                      type: string
                  required:
                  - image
                  - series
                  type: object
                maxItems: 8
                minItems: 1
                type: array
                x-kubernetes-list-map-keys:
                - series
                x-kubernetes-list-type: map
            required:
            - images
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
