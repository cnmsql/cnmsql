                            type: string
                        required:
                        - key
                        - name
                        type: object
                      inheritFromIAMRole:
                        default: false
                        description: |-
                          InheritFromIAMRole, when true, makes the credentials be retrieved from the
                          pod's environment (IRSA / instance profile) instead of from a secret.
                        type: boolean
                      secretAccessKey:
                        description: The reference to the secret key containing the
                          secret access key.
                        properties:
                          key:
                            description: Key within the Secret to select
                            type: string
                          name:
                            description: Name of the Secret
                            type: string
                        required:
                        - key
                        - name
                        type: object
                      sessionToken:
                        description: |-
                          The reference to the secret key containing the session token, used for
                          temporary credentials.
                        properties:
                          key:
                            description: Key within the Secret to select
                            type: string
                          name:
                            description: Name of the Secret
                            type: string
                        required:
                        - key
                        - name
                        type: object
                    type: object
                  endpoint:
                    description: |-
                      Endpoint is the URL of the S3-compatible service. Leave empty to target
