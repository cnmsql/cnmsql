# This rule is not used by the project cnmysql itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants full permissions ('*') over mysql.cloudnative-mysql.io.
# This role is intended for users authorized to modify roles and bindings within the cluster,
# enabling them to delegate specific permissions to other users or groups as needed.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: cnmysql
    app.kubernetes.io/managed-by: kustomize
  name: imagecatalog-admin-role
rules:
- apiGroups:
  - mysql.cloudnative-mysql.io
  resources:
  - imagecatalogs
  verbs:
  - '*'
- apiGroups:
  - mysql.cloudnative-mysql.io
  resources:
  - imagecatalogs/status
  verbs:
  - get
