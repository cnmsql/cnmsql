name: Register E2E pending status

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions: {}

concurrency:
  group: register-e2e-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  register:
    name: Register
    runs-on: ubuntu-latest
    permissions:
      statuses: write
    steps:
    - name: Register the e2e approval gate
      # A single pending status nudges for /test. A maintainer commenting /test
      # (authorize-e2e.yml) resolves it and dispatches the run; the run then posts
      # the per-lane `E2E / <lane>` result statuses.
      run: |
        PR_SHA="${{ github.event.pull_request.head.sha }}"
        gh api "repos/${{ github.repository }}/statuses/$PR_SHA" \
          -f state="pending" \
          -f context="e2e" \
          -f description="Pending approval — comment /test to run" \
          -f target_url="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
          --silent
      env:
        GH_TOKEN: ${{ github.token }}
